<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Widget</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .widget {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px;
            text-align: center;
            color: white;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.18);
            max-width: 400px;
            width: 100%;
        }
        .city {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 10px;
        }
        .temp {
            font-size: 48px;
            font-weight: 300;
            margin: 20px 0;
        }
        .description {
            font-size: 18px;
            opacity: 0.8;
            margin-bottom: 20px;
        }
        .details {
            display: flex;
            justify-content: space-between;
            margin-top: 20px;
        }
        .detail {
            text-align: center;
        }
        .detail-value {
            font-weight: 600;
            font-size: 16px;
        }
        .detail-label {
            opacity: 0.7;
            font-size: 12px;
            margin-top: 4px;
        }
        button {
            background: rgba(255, 255, 255, 0.2);
            border: none;
            color: white;
            padding: 12px 24px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 14px;
            margin-top: 20px;
            backdrop-filter: blur(5px);
            transition: all 0.3s ease;
        }
        button:hover {
            background: rgba(255, 255, 255, 0.3);
        }
    </style>
</head>
<body>
    <div class="widget">
        <div class="city" id="city">Loading...</div>
        <div class="temp" id="temp">--°</div>
        <div class="description" id="description">Getting weather data...</div>
        <div class="details">
            <div class="detail">
                <div class="detail-value" id="humidity">--%</div>
                <div class="detail-label">Humidity</div>
            </div>
            <div class="detail">
                <div class="detail-value" id="wind">-- km/h</div>
                <div class="detail-label">Wind</div>
            </div>
            <div class="detail">
                <div class="detail-value" id="feels">--°</div>
                <div class="detail-label">Feels like</div>
            </div>
        </div>
        <button onclick="refreshWeather()">Refresh</button>
    </div>

    <script src="app.js"></script>
</body>
</html>
